# nyu_siglip.yaml

name: "SPACE_SIGLIP_NYU"
epochs: 20
learning_rate: 0.0001
weight_decay: 0.01
batch_size: 32
workers: 8
gpu: "0"
root: "."
checkpoint_path: ""

random_seed: 42
scheduler: "cosine_warmup"
min_lr: 0.000001
warmup_ratio: 0.05

validate_epochs: 1
num_log_images: 5
notes: "SPACE-CLIP decoder with frozen SigLIP vision backbone on NYU."
tags: "space_clip,nyu,siglip,ema,aux"

dataset: "nyu"
data_path: "./datasets/kitti_nyu/nyu_depth_v2/sync/"
gt_path: "./datasets/kitti_nyu/nyu_depth_v2/sync/"
filenames_file: "./train_test_inputs/nyudepthv2_train_files_with_gt.txt"
data_path_eval: "./datasets/kitti_nyu/nyu_depth_v2/official_splits/test/"
gt_path_eval: "./datasets/kitti_nyu/nyu_depth_v2/official_splits/test/"
filenames_file_eval: "./train_test_inputs/nyudepthv2_test_files_with_gt.txt"

input_height: 480
input_width: 640
clip_input_size: 224

do_random_rotate: true
degree: 1.0

min_depth: 0.001
max_depth: 10.0
min_depth_eval: 0.001
max_depth_eval: 10.0
eval_crop: "none"
median_scaling_eval: false
eigen_crop: false
garg_crop: false

do_nyu_crop: false
do_nyu_crop_eval: false
do_kb_crop: false

use_film: true
use_structural_pathway: true
use_multiscale_supervision: true
aux_loss_weights: [0.10, 0.05, 0.00]

use_ema: true
ema_decay: 0.996
eval_with_ema: false
eval_both_for_best: true

eval_flip_tta: false
final_eval_flip_tta: true

vision_backbone_type: "siglip"
clip_model_name: "google/siglip-base-patch16-224"
vision_image_mean: [0.5, 0.5, 0.5]
vision_image_std: [0.5, 0.5, 0.5]
freeze_clip_vision: true
clip_interpolate_pos_encoding: false

main_path_indices: [12, 9, 6, 3]
structural_path_indices: [2, 1, 0]
film_param_hidden_dim: 256

decoder_channels: [256, 128, 64, 32]
decoder_dropout: 0.1

w_ssim: 0.5
w_grad: 0.0
use_image_orig_for_clip: false

warn_on_skipped_samples: true
skip_warning_limit: 20
strict_data_loading: false
