# kitti.yaml

name: "SPACE_CLIP_KITTI"
epochs: 20
learning_rate: 0.0001
weight_decay: 0.01
batch_size: 64
workers: 8
gpu: "0"
root: "."
checkpoint_path: ""

random_seed: 42
scheduler: "cosine_warmup"
min_lr: 0.000001
warmup_ratio: 0.05

validate_epochs: 1
num_log_images: 5
notes: "SPACE-CLIP KITTI default config (reported setting)."
tags: "space_clip,kitti,default,ema,aux"

dataset: "kitti"
data_path: "./datasets/kitti_nyu/kitti/"
gt_path: "./datasets/kitti_nyu/kitti/train/"
filenames_file: "./train_test_inputs/kitti_eigen_train_files_with_gt.txt"

data_path_eval: "./datasets/kitti_nyu/kitti/"
gt_path_eval: "./datasets/kitti_nyu/kitti/val/"
filenames_file_eval: "./train_test_inputs/kitti_eigen_test_files_with_gt.txt"

input_height: 352
input_width: 704
clip_input_size: 224

do_random_rotate: true
degree: 1.0

min_depth: 0.001
max_depth: 80.0
min_depth_eval: 0.001
max_depth_eval: 80.0
eigen_crop: true
garg_crop: false

use_film: true
use_structural_pathway: true
use_multiscale_supervision: true
aux_loss_weights: [0.10, 0.05, 0.00]

use_ema: true
ema_decay: 0.996
eval_with_ema: false
eval_both_for_best: true

eval_flip_tta: false
final_eval_flip_tta: true

clip_model_name: "openai/clip-vit-base-patch16"
freeze_clip_vision: true
clip_interpolate_pos_encoding: false

main_path_indices: [12, 9, 6, 3]
structural_path_indices: [2, 1, 0]
film_param_hidden_dim: 256

decoder_channels: [256, 128, 64, 32]
decoder_dropout: 0.1

w_ssim: 0.5
w_grad: 0.0
use_image_orig_for_clip: false
